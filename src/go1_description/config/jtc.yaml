controller_manager:
  ros__parameters:
    update_rate: 1000
    use_sim_time: true
    # 1. 广播员：负责把关节角度发给 RViz
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
    # 2. 腿部总控制器：统一管理 12 个关节的力矩
    leg_controller:
      type: effort_controllers/JointGroupEffortController
      #type: position_controllers/JointGroupPositionController # 位置控制器，直接给定目标角度


leg_controller:
  ros__parameters:
    joints:
      - FR_hip_joint
      - FR_thigh_joint
      - FR_calf_joint
      - FL_hip_joint
      - FL_thigh_joint
      - FL_calf_joint
      - RR_hip_joint
      - RR_thigh_joint
      - RR_calf_joint
      - RL_hip_joint
      - RL_thigh_joint
      - RL_calf_joint

